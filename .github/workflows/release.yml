# 자동: Semantic Version 태그 푸시 (예: release-please 머지 후 생성된 v1.2.3)
#   ※ release-please 가 GITHUB_TOKEN 만 쓰면 태그 푸시가 다른 워크플로를 트리거하지 않을 수 있음 → Secret RELEASE_PLEASE_TOKEN(PAT) 권장
# 수동: Actions → Release → Run workflow (git_ref·version 지정, GitHub Release 생략 가능)
#
# 프로덕션: Oracle Cloud Infrastructure Ampere A1(ARM64). 이미지는 linux/arm64만 빌드합니다.
# (x86/amd64는 사용하지 않음. 필요하면 아래 docker-publish 의 platforms에 linux/amd64 를 추가.)
#
# 이미지: ghcr.io/<소문자 owner>/<소문자 repo>/auth-service | auth-ui :<태그>
# 패키지가 보이지 않으면 저장소 Settings → Actions → General → Workflow permissions 에서
# "Read and write permissions" 및 패키지 쓰기가 가능한지 확인하세요.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      git_ref:
        description: '빌드할 Git ref (브랜치·태그·전체 SHA)'
        type: string
        required: true
        default: main
      version:
        description: '릴리스·이미지 버전 (예: 1.2.3 또는 v1.2.3)'
        type: string
        required: true
      create_github_release:
        description: 'GitHub Release 생성 (태그가 없으면 이 ref에 생성)'
        type: boolean
        required: false
        default: true

concurrency:
  group: >-
    ${{ github.event_name == 'workflow_dispatch'
        && format('release-manual-{0}-{1}', github.event.inputs.version, github.event.inputs.git_ref)
        || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.ctx.outputs.tag }}
      semver: ${{ steps.ctx.outputs.semver }}
      checkout_ref: ${{ steps.ctx.outputs.checkout_ref }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Resolve checkout ref & version (tag push vs 수동)
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHECKOUT_REF="${{ github.event.inputs.git_ref }}"
            VIN="${{ github.event.inputs.version }}"
          else
            CHECKOUT_REF="${{ github.ref_name }}"
            VIN="${{ github.ref_name }}"
          fi
          V="${VIN#v}"
          echo "semver=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Record commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Enable Yarn
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Service unit & integration tests
        run: yarn service:test:unit

      - name: Module dependency rules (dependency-cruiser)
        working-directory: service
        run: yarn test:arch

      - name: UI unit tests
        run: yarn ui:test

      - name: Build service (호스트 검증 — Docker 빌드와 별도)
        run: yarn service:build

      - name: Build interaction-ui
        run: yarn interaction-ui:build

      - name: Build admin ui
        run: yarn ui:build

  docker-publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            dockerfile: deploy/docker/Dockerfile.service
          - image_name: auth-ui
            dockerfile: deploy/docker/Dockerfile.ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Lowercase image namespace
        id: ns
        run: |
          R=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_lc=$R" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.ns.outputs.repository_lc }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ needs.verify.outputs.tag }}
            type=raw,value=${{ needs.verify.outputs.semver }}
            type=semver,pattern={{version}},value=${{ needs.verify.outputs.semver }}
            type=semver,pattern=v{{version}},value=${{ needs.verify.outputs.semver }}

      # x86(amd64) 미사용 — OCI A1(ARM64) 전용. x86 필요 시: platforms 에 linux/amd64 추가.
      - name: Build and push (${{ matrix.image_name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  github-release:
    needs: [verify, docker-publish]
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.create_github_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Lowercase image namespace (for release body)
        id: ns
        run: |
          R=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repository_lc=$R" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          target_commitish: ${{ needs.verify.outputs.sha }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Container images (GHCR)

            **auth-service**

            ```text
            docker pull ${{ env.REGISTRY }}/${{ steps.ns.outputs.repository_lc }}/auth-service:${{ needs.verify.outputs.tag }}
            ```

            **auth-ui**

            ```text
            docker pull ${{ env.REGISTRY }}/${{ steps.ns.outputs.repository_lc }}/auth-ui:${{ needs.verify.outputs.tag }}
            ```

            이미지 아키텍처: linux/arm64 (OCI A1 등 ARM 노드용).

            각 이미지에 `latest` 및 semver 형태 태그(예: `1.0.0`, `v1.0.0`)가 함께 붙습니다.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
