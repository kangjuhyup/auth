apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: api
data:
  NODE_ENV: production
  # DB_* 는 시크릿에서 주입하는 편이 안전합니다. 여기서는 드라이버·호스트만 예시로 둡니다.
  DB_DRIVER: postgresql
  DB_HOST: postgresql.auth.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: auth
  OIDC_ADAPTER_DRIVER: hybrid
  OIDC_ACCESS_TOKEN_FORMAT: opaque
  # 공개 issuer URL (Ingress/LB 주소와 일치해야 합니다)
  OIDC_ISSUER: https://auth.example.com
  OIDC_CACHE_TTL_MARGIN_SEC: "5"
  OIDC_CACHE_NEGATIVE_TTL_SEC: "3"
  OIDC_CACHE_BACKFILL_TTL_SEC: "60"
  OTP_PASSWORD_RESET_TTL_SEC: "900"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_FROM: noreply@example.com
