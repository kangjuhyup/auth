apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-ui
  labels:
    app.kubernetes.io/name: auth-ui
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: auth-ui
          image: auth-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101 # nginx 기본 uid
            capabilities:
              drop:
                - ALL
