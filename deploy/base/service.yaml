# Headless Service — StatefulSet pod 간 직접 DNS 라우팅용
apiVersion: v1
kind: Service
metadata:
  name: auth-service-headless
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
# ClusterIP Service — 클러스터 내부 로드밸런싱용
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
