# 프로덕션: 사전에 네임스페이스 auth 에 Secret auth-service-secrets 를 생성한 뒤 적용하세요.
#   kubectl apply -f deploy/base/namespace.yaml
#   kubectl -n auth create secret generic auth-service-secrets --from-env-file=secrets.env
#   kubectl apply -k deploy/overlays/production
#
# 이미지·OIDC_ISSUER·DB_HOST 는 아래 patches / images 를 수정하세요.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
  - path: hpa-patch.yaml
  # HPA가 replicas 를 조정하므로 StatefulSet 매니페스트에서 제거 (기본 1 → HPA가 min 으로 상향)
  - patch: |-
      - op: remove
        path: /spec/replicas
    target:
      group: apps
      version: v1
      kind: StatefulSet
      name: auth-service

images:
  - name: auth-service
    newName: ghcr.io/REPLACE_ORG/auth-service
    newTag: latest
  - name: auth-ui
    newName: ghcr.io/REPLACE_ORG/auth-ui
    newTag: latest
