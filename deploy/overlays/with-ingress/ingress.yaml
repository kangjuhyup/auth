# 표준 Kubernetes Ingress (nginx ingress controller)
# 호스트·ingressClassName·TLS secretName 은 클러스터에 맞게 수정하세요.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.example.com
      secretName: auth-service-tls
  rules:
    - host: auth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ui
  labels:
    app.kubernetes.io/name: auth-ui
    app.kubernetes.io/component: frontend
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ui.auth.example.com
      secretName: auth-ui-tls
  rules:
    - host: ui.auth.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-ui
                port:
                  number: 80
