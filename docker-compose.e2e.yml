services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: auth-postgres-e2e
    environment:
      POSTGRES_DB: auth_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-e2e:
    image: redis:7-alpine
    container_name: auth-redis-e2e
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
